<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PUBG Mortar / Distance Calculator</title>
<style>
  :root{
    --bg:#0e1116; --panel:#161b22; --panel2:#1c232d; --line:#2a323d;
    --accent:#f0a020; --accent2:#ffce4d; --text:#e6edf3; --muted:#8b97a7;
    --good:#3fb950;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:'Segoe UI',Roboto,system-ui,sans-serif}
  html,body{height:100%;background:var(--bg);color:var(--text);overflow:hidden}
  #app{display:flex;height:100vh;width:100vw}
  svg.ic{width:16px;height:16px;flex:0 0 16px;stroke:currentColor;fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}

  /* ---------- SIDEBAR ---------- */
  #sidebar{
    width:260px;flex:0 0 260px;background:var(--panel);border-right:1px solid var(--line);
    display:flex;flex-direction:column;padding:16px 12px;gap:6px;overflow-y:auto;overflow-x:hidden;
  }
  #sidebar h1{font-size:15px;letter-spacing:.5px;margin-bottom:2px;display:flex;align-items:center;gap:8px}
  #sidebar h1 svg.ic{width:20px;height:20px;color:var(--accent)}
  #sidebar .sub{font-size:11px;color:var(--muted);margin-bottom:14px}
  .sec-label{font-size:11px;text-transform:uppercase;letter-spacing:1px;color:var(--muted);margin:10px 4px 6px}
  .map-btn{
    display:flex;justify-content:space-between;align-items:center;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;
    color:var(--text);padding:9px 12px;cursor:pointer;font-size:13px;transition:.15s;
  }
  .map-btn:hover{border-color:var(--accent);background:#222b36}
  .map-btn.active{border-color:var(--accent);background:#2a2417;color:var(--accent2)}
  .map-btn small{color:var(--muted);font-size:11px}
  .map-btn.active small{color:var(--accent)}

  .toggle-row{display:flex;align-items:center;justify-content:space-between;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:9px 12px;font-size:13px;margin-top:4px}
  .switch{position:relative;width:40px;height:22px}
  .switch input{display:none}
  .slider{position:absolute;inset:0;background:#3a434f;border-radius:20px;cursor:pointer;transition:.2s}
  .slider:before{content:"";position:absolute;width:16px;height:16px;left:3px;top:3px;background:#fff;border-radius:50%;transition:.2s}
  .switch input:checked + .slider{background:var(--accent)}
  .switch input:checked + .slider:before{transform:translateX(18px)}

  .btn{
    display:flex;align-items:center;justify-content:center;gap:8px;
    background:var(--panel2);border:1px solid var(--line);border-radius:8px;color:var(--text);
    padding:10px;cursor:pointer;font-size:13px;transition:.15s;
  }
  .btn:hover{border-color:var(--accent);color:var(--accent2)}
  .report{font-size:10px;color:var(--muted);text-align:center;line-height:1.5;padding:0 4px}
  .report a{color:#4ea3ff;cursor:pointer;text-decoration:none;font-weight:600}
  .report a:hover{text-decoration:underline}
  .support{text-align:center;padding-top:8px}
  .support a{display:inline-flex;align-items:center;gap:5px;color:#ff5e9c;font-size:12px;font-weight:600;text-decoration:none;cursor:pointer}
  .support a:hover{text-decoration:underline}
  .support svg{width:14px;height:14px;flex:0 0 auto}
  .credit{font-size:10px;color:var(--muted);text-align:center;padding-top:8px}

  /* ---------- MAIN ---------- */
  #main{flex:1;position:relative;overflow:hidden;background:#0a0d12}
  canvas{display:block;width:100%;height:100%;cursor:crosshair}

  #hud{
    position:absolute;top:14px;left:50%;transform:translateX(-50%);
    background:rgba(16,20,26,.85);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:10px;padding:10px 22px;text-align:center;
    box-shadow:0 4px 20px rgba(0,0,0,.4)
  }
  #hud .lbl{font-size:10px;letter-spacing:2px;color:var(--muted);text-transform:uppercase}
  #hud .val{font-size:26px;font-weight:700;color:var(--accent2);line-height:1.1}
  #hud .hint{font-size:10px;color:var(--muted);margin-top:3px}
  #hudLoading{min-width:200px}
  #hudLoading .load-title{font-size:22px;font-weight:700;color:var(--accent2);letter-spacing:.5px;line-height:1.15}
  #hudLoading .load-sub{font-size:11px;color:var(--muted);margin-top:4px}
  .load-dots::after{content:"";animation:loadDots 1.2s steps(4,end) infinite}
  @keyframes loadDots{0%{content:""}25%{content:"."}50%{content:".."}75%{content:"..."}100%{content:""}}

  #zoombar{
    position:absolute;bottom:18px;left:50%;transform:translateX(-50%);
    display:flex;align-items:center;gap:2px;
    background:rgba(16,20,26,.9);backdrop-filter:blur(6px);
    border:1px solid var(--line);border-radius:10px;padding:5px;
    box-shadow:0 4px 20px rgba(0,0,0,.4)
  }
  #zoombar button{
    width:38px;height:34px;background:transparent;border:none;color:var(--text);
    cursor:pointer;border-radius:6px;transition:.15s;display:flex;align-items:center;justify-content:center
  }
  #zoombar button:hover{background:#2a323d;color:var(--accent2)}
  #zoompct{min-width:62px;text-align:center;font-size:14px;font-weight:600;cursor:pointer}
  #zoompct:hover{color:var(--accent2)}


  #langBar{display:grid;grid-template-columns:repeat(4,1fr);gap:10px 6px;margin-top:auto;margin-bottom:60px;padding-top:14px}
  .flag{position:relative;display:flex;flex-direction:column;align-items:center;gap:3px;cursor:pointer;opacity:.5;transition:.15s}
  .flag:hover{opacity:1}
  .flag.active{opacity:1}
  .flag svg{width:24px;height:24px;border-radius:4px;border:1px solid #2a323d;display:block}
  .flag.active svg{border-color:var(--accent);box-shadow:0 0 0 1px var(--accent)}
  .flag span{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.5px}
  .flag.active span{color:var(--accent2)}

  .flag::after{content:attr(data-name);position:absolute;bottom:calc(100% + 8px);left:50%;transform:translateX(-50%) translateY(4px);
    background:#0a0d12;color:var(--text);border:1px solid var(--line);border-radius:6px;
    padding:4px 8px;font-size:11px;white-space:nowrap;pointer-events:none;
    opacity:0;transition:opacity .15s,transform .15s;transition-delay:0s;z-index:20;
    box-shadow:0 4px 14px rgba(0,0,0,.5)}
  .flag::before{content:"";position:absolute;bottom:calc(100% + 3px);left:50%;transform:translateX(-50%) translateY(4px);
    border:5px solid transparent;border-top-color:var(--line);opacity:0;transition:opacity .15s,transform .15s;transition-delay:0s;pointer-events:none;z-index:20}
  .flag:hover::after,.flag:hover::before{opacity:1;transform:translateX(-50%) translateY(0);transition-delay:.9s}
</style>
</head>
<body>
<div id="app">
  <aside id="sidebar">
    <h1>
      <svg class="ic" viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><circle cx="12" cy="12" r="4"/><line x1="12" y1="1" x2="12" y2="5"/><line x1="12" y1="19" x2="12" y2="23"/><line x1="1" y1="12" x2="5" y2="12"/><line x1="19" y1="12" x2="23" y2="12"/></svg>
      MORTAR CALC
    </h1>
    <div class="sub" id="t-sub">PUBG distance & grid tool</div>

    <div class="sec-label" id="t-maps">Карты</div>
    <div id="mapList"></div>

    <div class="sec-label" id="t-settings">Настройки</div>
    <label class="toggle-row"><span id="t-grid">Сетка 100 м</span>
      <span class="switch"><input type="checkbox" id="gridToggle" checked><span class="slider"></span></span>
    </label>
    <button class="btn" id="clearBtn" style="margin-top:8px">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 6h18"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
      <span id="t-clear">Очистить точки</span>
    </button>
    <button class="btn" id="resetBtn">
      <svg class="ic" viewBox="0 0 24 24"><path d="M3 12a9 9 0 1 0 3-6.7"/><polyline points="3 3 3 9 9 9"/></svg>
      <span id="t-reset">Сбросить вид</span>
    </button>

    <div id="langBar"></div>
    <div class="report" id="t-report"></div>
    <div class="support"><a id="t-support" href="https://ko-fi.com/ftomovych" target="_blank" rel="noopener"></a></div>
    <div class="credit">Made by Ftomovych</div>
  </aside>

  <main id="main">
    <canvas id="cv"></canvas>
    <div id="hud">
      <div id="hudMain">
        <div class="lbl" id="t-distance">Дистанция</div>
        <div class="val"><span id="distVal">0</span> <span id="t-unit">m</span></div>
        <div class="hint" id="t-hint">ЛКМ — создать точку · ПКМ зажать — двигать карту · ПКМ-клик / Backspace — сбросить точки</div>
      </div>
      <div id="hudLoading" style="display:none">
        <div class="load-title" id="t-loading">Loading map</div>
        <div class="load-sub"><span id="t-loadingSub">Please wait</span><span class="load-dots"></span></div>
      </div>
    </div>
    <div id="zoombar">
      <button id="zoomOut" title="Уменьшить"><svg class="ic" viewBox="0 0 24 24" style="width:18px;height:18px"><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
      <div id="zoompct">100%</div>
      <button id="zoomIn" title="Увеличить"><svg class="ic" viewBox="0 0 24 24" style="width:18px;height:18px"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg></button>
    </div>
  </main>
</div>

<script>
const MAPS = [
  { id:"erangel",  name:"Erangel",  size:8000, img:"maps/erangel.png" },
  { id:"miramar",  name:"Miramar",  size:8000, img:"maps/miramar.png" },
  { id:"taego",    name:"Taego",    size:8000, img:"maps/taego.png" },
  { id:"deston",   name:"Deston",   size:8000, img:"maps/deston.png" },
  { id:"rondo",    name:"Rondo",    size:8000, img:"maps/rondo.png" },
  { id:"vikendi",  name:"Vikendi",  size:6000, img:"maps/vikendi.png" },
  { id:"sanhok",   name:"Sanhok",   size:4000, img:"maps/sanhok.png" },
  { id:"paramo",   name:"Paramo",   size:3000, img:"maps/paramo.png" },
  { id:"karakin",  name:"Karakin",  size:2000, img:"maps/karakin.png" },
];
const GRID_STEP = 100;

const cv = document.getElementById('cv');
const ctx = cv.getContext('2d');
let view = { scale:1, ox:0, oy:0 };
let img = new Image();
let curMap = MAPS[0];
let points = [];
let hover = null;            // {mx,my} позиция курсора для превью-линии
let drag = null;
let imgLoaded = false;
let baseScale = 1;
let UNIT='m'; let LANG='en';

function resize(){
  const r = document.getElementById('main').getBoundingClientRect();
  cv.width = r.width; cv.height = r.height;
  draw();
}
window.addEventListener('resize', resize);

function showLoading(on){
  document.getElementById('hudMain').style.display = on ? 'none' : 'block';
  document.getElementById('hudLoading').style.display = on ? 'block' : 'none';
}
function loadMap(m){
  curMap = m; points = []; hover=null; imgLoaded = false;
  showLoading(true);
  document.querySelectorAll('.map-btn').forEach(b=>b.classList.toggle('active', b.dataset.id===m.id));
  img = new Image();
  img.onload = ()=>{ imgLoaded = true; showLoading(false); fitView(); };
  img.onerror = ()=>{ document.getElementById('t-loading').textContent='Image not found: '+m.img; };
  img.src = m.img;
  updateDist();
}
function fitView(){
  const pad = 40;
  const sx = (cv.width-pad)/img.width, sy=(cv.height-pad)/img.height;
  baseScale = Math.min(sx,sy);
  view.scale = baseScale;
  view.ox = (cv.width - img.width*view.scale)/2;
  view.oy = (cv.height - img.height*view.scale)/2;
  draw();
}

const toScreen = (mx,my)=>({x: mx*view.scale+view.ox, y: my*view.scale+view.oy});
const toMap    = (x,y)=>({mx:(x-view.ox)/view.scale, my:(y-view.oy)/view.scale});
const metersPerImgPx = ()=> curMap.size / img.width;

function draw(){
  ctx.clearRect(0,0,cv.width,cv.height);
  if(!imgLoaded) return;
  ctx.imageSmoothingQuality='high';
  ctx.drawImage(img, view.ox, view.oy, img.width*view.scale, img.height*view.scale);
  if(document.getElementById('gridToggle').checked) drawGrid();
  drawMeasure();
  document.getElementById('zoompct').textContent = Math.round(view.scale/baseScale*100)+'%';
}

function drawGrid(){
  const mpp = metersPerImgPx();
  const stepImg = GRID_STEP / mpp;
  const stepScr = stepImg * view.scale;
  if(stepScr < 6) return;
  const showLbl = stepScr>34;
  ctx.lineWidth = 1; ctx.font = '10px Segoe UI';
  for(let mx=0; mx<=img.width+0.5; mx+=stepImg){
    const x = mx*view.scale+view.ox;
    if(x< -1 || x>cv.width+1) continue;
    const km = Math.round(mx*mpp)%1000===0;
    ctx.strokeStyle = km ? 'rgba(240,160,32,.55)' : 'rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.moveTo(x, Math.max(view.oy,0)); ctx.lineTo(x, Math.min(view.oy+img.height*view.scale, cv.height)); ctx.stroke();
  }
  for(let my=0; my<=img.height+0.5; my+=stepImg){
    const y = my*view.scale+view.oy;
    if(y< -1 || y>cv.height+1) continue;
    const km = Math.round(my*mpp)%1000===0;
    ctx.strokeStyle = km ? 'rgba(240,160,32,.55)' : 'rgba(255,255,255,.18)';
    ctx.beginPath(); ctx.moveTo(Math.max(view.ox,0), y); ctx.lineTo(Math.min(view.ox+img.width*view.scale, cv.width), y); ctx.stroke();
  }
  if(showLbl){
    ctx.fillStyle='rgba(255,206,77,.9)';
    for(let mx=0; mx<=img.width+0.5; mx+=stepImg){
      const m=Math.round(mx*mpp); if(m%1000!==0) continue;
      const x=mx*view.scale+view.ox; if(x<0||x>cv.width) continue;
      ctx.fillText((m/1000)+'km', x+2, Math.max(view.oy,0)+12);
    }
  }
}

function dot(s,color){
  ctx.fillStyle=color; ctx.beginPath(); ctx.arc(s.x,s.y,6,0,7); ctx.fill();
  ctx.strokeStyle='#fff'; ctx.lineWidth=2; ctx.stroke();
}
function lineLabel(a,b,text,color){
  const mx=(a.x+b.x)/2, my=(a.y+b.y)/2;
  ctx.font='bold 13px Segoe UI'; const w=ctx.measureText(text).width;
  ctx.fillStyle='rgba(16,20,26,.85)'; ctx.fillRect(mx-w/2-6, my-20, w+12, 18);
  ctx.fillStyle=color; ctx.fillText(text, mx-w/2, my-7);
}

function drawMeasure(){
  // готовая линия (2 точки)
  if(points.length===2){
    const a=toScreen(points[0].mx,points[0].my), b=toScreen(points[1].mx,points[1].my);
    ctx.strokeStyle='#ffce4d'; ctx.lineWidth=2; ctx.setLineDash([6,5]);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.setLineDash([]);
    lineLabel(a,b, metersBetween(points[0],points[1])+' '+UNIT, '#ffce4d');
  }
  // ПРЕВЬЮ-линия: первая точка стоит, тянемся за курсором
  if(points.length===1 && hover){
    const a=toScreen(points[0].mx,points[0].my), b=toScreen(hover.mx,hover.my);
    ctx.strokeStyle='rgba(255,206,77,.45)'; ctx.lineWidth=2; ctx.setLineDash([5,5]);
    ctx.beginPath(); ctx.moveTo(a.x,a.y); ctx.lineTo(b.x,b.y); ctx.stroke(); ctx.setLineDash([]);
    ctx.globalAlpha=.6; dot(b,'#f0a020'); ctx.globalAlpha=1;
    lineLabel(a,b, metersBetween(points[0],hover)+' '+UNIT, 'rgba(255,206,77,.85)');
  }
  // точки поверх
  points.forEach((p,i)=> dot(toScreen(p.mx,p.my), i===0?'#3fb950':'#f0a020'));
}

function metersBetween(p,q){
  const mpp=metersPerImgPx();
  return Math.round(Math.hypot((q.mx-p.mx)*mpp,(q.my-p.my)*mpp));
}
function measure(){ return points.length<2?0:metersBetween(points[0],points[1]); }
function updateDist(){ document.getElementById('distVal').textContent = measure(); }

function zoomAt(x,y,factor){
  const m=toMap(x,y);
  view.scale = Math.min(baseScale*40, Math.max(baseScale*0.3, view.scale*factor));
  view.ox = x - m.mx*view.scale; view.oy = y - m.my*view.scale; draw();
}

cv.addEventListener('wheel', e=>{ e.preventDefault(); zoomAt(e.offsetX,e.offsetY, e.deltaY<0?1.15:1/1.15); },{passive:false});
function clearPoints(){ points=[]; hover=null; updateDist(); draw(); }
cv.addEventListener('mousedown', e=>{
  if(e.button===2 || e.button===1){ drag={x:e.offsetX,y:e.offsetY,ox:view.ox,oy:view.oy,btn:e.button,moved:false}; }
});
window.addEventListener('mousemove', e=>{
  const r=cv.getBoundingClientRect();
  if(drag){
    if(Math.hypot(e.clientX-r.left-drag.x, e.clientY-r.top-drag.y)>4) drag.moved=true;
    view.ox=drag.ox+(e.clientX-r.left-drag.x); view.oy=drag.oy+(e.clientY-r.top-drag.y); draw(); return;
  }
  if(points.length===1 && e.target===cv){ var hm=toMap(e.clientX-r.left, e.clientY-r.top); hm.mx=Math.max(0,Math.min(img.width,hm.mx)); hm.my=Math.max(0,Math.min(img.height,hm.my)); hover=hm; draw(); }
});
window.addEventListener('mouseup', e=>{
  if(drag && drag.btn===2 && !drag.moved){ clearPoints(); }  // ПКМ-клик без перетаскивания — сброс
  drag=null;
});
window.addEventListener('keydown', e=>{ if(e.key==='Backspace'){ e.preventDefault(); clearPoints(); } }); // Backspace — сброс
cv.addEventListener('contextmenu', e=>e.preventDefault());
cv.addEventListener('mouseleave', ()=>{ if(points.length===1){ hover=null; draw(); } });

let downPos=null;
cv.addEventListener('mousedown', e=>{ if(e.button===0) downPos={x:e.offsetX,y:e.offsetY}; });
cv.addEventListener('mouseup', e=>{
  if(e.button!==0 || !downPos) return;
  if(Math.hypot(e.offsetX-downPos.x, e.offsetY-downPos.y)>4){ downPos=null; return; }
  const m=toMap(e.offsetX,e.offsetY);
  if(m.mx<0||m.my<0||m.mx>img.width||m.my>img.height){ downPos=null; return; } // только в пределах карты
  if(points.length>=2){ points=[]; }
  points.push(m);
  if(points.length===2) hover=null;
  updateDist(); draw(); downPos=null;
});

function buildMapList(){
  const box=document.getElementById('mapList'); box.innerHTML='';
  MAPS.forEach(m=>{
    const km=(m.size/1000);
    const nm=(I18N[LANG].maps && I18N[LANG].maps[m.id]) || m.name;
    const b=document.createElement('div');
    b.className='map-btn'+(m.id===curMap.id?' active':'');
    b.dataset.id=m.id;
    b.innerHTML='<span>'+nm+'</span><small>'+km+'×'+km+' km</small>';
    b.onclick=()=>loadMap(m);
    box.appendChild(b);
  });
}
document.getElementById('gridToggle').onchange=draw;
document.getElementById('clearBtn').onclick=clearPoints;
document.getElementById('resetBtn').onclick=fitView;
document.getElementById('zoomIn').onclick=()=>zoomAt(cv.width/2,cv.height/2,1.25);
document.getElementById('zoomOut').onclick=()=>zoomAt(cv.width/2,cv.height/2,1/1.25);
document.getElementById('zoompct').onclick=fitView;


/* ==================== ПЕРЕВОДЫ ==================== */
const I18N = {
  de:{ sub:"PUBG Distanz- und Raster-Tool", maps_label:"Karten", settings:"Einstellungen", grid:"100-m-Raster",
       clear:"Punkte löschen", reset:"Ansicht zurücksetzen", distance:"Distanz", unit:"m",
       hint:"LMT — Punkt setzen · RMT halten — Karte bewegen · RMT-Klick / Rücktaste — Punkte löschen",
       loading:"Karte wird geladen", loadingSub:"Bitte warten",
       maps:{erangel:"Erangel",miramar:"Miramar",taego:"Taego",deston:"Deston",rondo:"Rondo",vikendi:"Vikendi",sanhok:"Sanhok",paramo:"Paramo",karakin:"Karakin"} },
  ko:{ sub:"PUBG 거리 및 그리드 도구", maps_label:"지도", settings:"설정", grid:"100m 그리드",
       clear:"지점 지우기", reset:"보기 초기화", distance:"거리", unit:"m",
       hint:"좌클릭 — 지점 추가 · 우클릭 누르기 — 지도 이동 · 우클릭 / 백스페이스 — 지점 지우기",
       loading:"지도 불러오는 중", loadingSub:"잠시만 기다려 주세요",
       maps:{erangel:"에란겔",miramar:"미라마",taego:"태이고",deston:"데스턴",rondo:"론도",vikendi:"비켄디",sanhok:"사녹",paramo:"파라모",karakin:"카라킨"} },
  vi:{ sub:"Công cụ đo khoảng cách và lưới PUBG", maps_label:"Bản đồ", settings:"Cài đặt", grid:"Lưới 100 m",
       clear:"Xóa điểm", reset:"Đặt lại chế độ xem", distance:"Khoảng cách", unit:"m",
